<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>

    <!-- Gradients per desktop -->
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="gradPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Background -->
    <rect width="1024" height="1024" rx="228" ry="228" fill="#0f0f14"/>

    <!-- Grid: 2x2 with margin=170, gap=40 -->
    <!-- Each tile: (1024 - 170*2 - 40) / 2 = 322 -->

    <!-- Top-left: Blue (Desktop 1) -->
    <rect x="170" y="170" width="322" height="322" rx="36" fill="url(#gradBlue)"/>
    <text x="331" y="370" font-family="SF Pro Rounded, -apple-system, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="150" font-weight="800" fill="white" fill-opacity="0.95" text-anchor="middle">1</text>

    <!-- Top-right: Green (Desktop 2) -->
    <rect x="532" y="170" width="322" height="322" rx="36" fill="url(#gradGreen)"/>
    <text x="693" y="370" font-family="SF Pro Rounded, -apple-system, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="150" font-weight="800" fill="white" fill-opacity="0.95" text-anchor="middle">2</text>

    <!-- Bottom-left: Orange (Desktop 3) -->
    <rect x="170" y="532" width="322" height="322" rx="36" fill="url(#gradOrange)"/>
    <text x="331" y="732" font-family="SF Pro Rounded, -apple-system, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="150" font-weight="800" fill="white" fill-opacity="0.95" text-anchor="middle">3</text>

    <!-- Bottom-right: Purple (Desktop 4) -->
    <rect x="532" y="532" width="322" height="322" rx="36" fill="url(#gradPurple)"/>
    <text x="693" y="732" font-family="SF Pro Rounded, -apple-system, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="150" font-weight="800" fill="white" fill-opacity="0.95" text-anchor="middle">4</text>
  </g>
</svg>
